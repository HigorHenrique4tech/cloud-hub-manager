global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'service', 'instance']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  # Sub-routes for different severities
  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 5m
      continue: true

    - match:
        severity: warning
      receiver: warning
      repeat_interval: 30m

receivers:
  - name: 'default'
    # Default receiver - no configuration (alerts won't be delivered)
    # Add email_configs, slack_configs, etc. to enable notifications

  - name: 'critical'
    # Critical alerts configuration
    # Example for email:
    # email_configs:
    #   - to: ops@example.com
    #     from: alertmanager@example.com
    #     smarthost: smtp.example.com:587
    #     auth_username: alertmanager@example.com
    #     auth_password: password

    # Example for Slack:
    # slack_configs:
    #   - api_url: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
    #     channel: '#migration-alerts'
    #     title: 'Critical Migration Alert'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'warning'
    # Warning alerts configuration
    # slack_configs:
    #   - api_url: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
    #     channel: '#migration-warnings'
    #     title: 'Migration Warning'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  # Inhibit warning alerts if critical alert is already firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
