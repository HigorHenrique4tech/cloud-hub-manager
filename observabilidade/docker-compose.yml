version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudatlas-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d' # Retenção de 15 dias para métricas
    ports:
      - "9090:9090"
    networks:
      - observabilidade_net

  grafana:
    image: grafana/grafana:latest
    container_name: cloudatlas-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=adminsecret # Altere na produção
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - observabilidade_net

networks:
  observabilidade_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
