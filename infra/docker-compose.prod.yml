version: '3.8'

services:
  # ── Caddy (HTTPS reverse proxy + auto SSL) ──────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: cloudatlas-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../landingpage:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - cloudatlas-network
    depends_on:
      frontend:
        condition: service_started
      desk-frontend:
        condition: service_started
    restart: unless-stopped

  # ── Cache (Redis) ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudatlas-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - cloudatlas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cloudatlas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudatlas_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cloudatlas_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloudatlas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudatlas} -d ${POSTGRES_DB:-cloudatlas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + Gunicorn) ─────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.prod.Dockerfile
    container_name: cloudatlas-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudatlas}:${POSTGRES_PASSWORD:-cloudatlas_pass}@postgres:5432/${POSTGRES_DB:-cloudatlas_db}
      - SECRET_KEY=${SECRET_KEY:-changeme-use-openssl-rand-hex-32-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - 'ALLOWED_ORIGINS=["https://cloudatlas.app.br","https://www.cloudatlas.app.br","https://hub.cloudatlas.app.br","https://desk.cloudatlas.app.br","http://localhost","http://localhost:3000"]'
      - DEBUG=False
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Cloud credentials
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-2}
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      # Email
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@cloudatlas.io}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-True}
      - FRONTEND_URL=${FRONTEND_URL:-https://cloudatlas.app.br}
      # OAuth (SSO)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      # Payments
      - ABACATEPAY_API_KEY=${ABACATEPAY_API_KEY:-}
      - ABACATEPAY_WEBHOOK_SECRET=${ABACATEPAY_WEBHOOK_SECRET:-}
      # Cache
      - REDIS_URL=redis://redis:6379/0
    networks:
      - cloudatlas-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── Frontend (Nginx + React build) ──────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.prod.Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
        VITE_MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
    container_name: cloudatlas-frontend
    networks:
      - cloudatlas-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Desk Frontend (Nginx + React build) ──────────────────────────────────────
  desk-frontend:
    build:
      context: ..
      dockerfile: infra/docker/desk-frontend.prod.Dockerfile
    container_name: cloudatlas-desk-frontend
    networks:
      - cloudatlas-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Migration Worker (Celery) ────────────────────────────────────────────────
  migration-worker:
    build:
      context: ..
      dockerfile: infra/docker/backend.prod.Dockerfile
    container_name: cloudatlas-migration-worker
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "migration", "--loglevel=info", "--concurrency=2"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudatlas}:${POSTGRES_PASSWORD:-cloudatlas_pass}@postgres:5432/${POSTGRES_DB:-cloudatlas_db}
      - SECRET_KEY=${SECRET_KEY:-changeme-use-openssl-rand-hex-32-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping", "--timeout=5"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - cloudatlas-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Database Backup (daily to Azure Blob Storage) ───────────────────────────
  backup:
    build:
      context: ..
      dockerfile: infra/docker/backup.Dockerfile
    container_name: cloudatlas-backup
    environment:
      - PGHOST=postgres
      - PGUSER=${POSTGRES_USER:-cloudatlas}
      - PGPASSWORD=${POSTGRES_PASSWORD:-cloudatlas_pass}
      - PGDATABASE=${POSTGRES_DB:-cloudatlas_db}
      - AZURE_STORAGE_ACCOUNT=${BACKUP_AZURE_STORAGE_ACCOUNT:-}
      - AZURE_STORAGE_KEY=${BACKUP_AZURE_STORAGE_KEY:-}
      - AZURE_STORAGE_CONTAINER=${BACKUP_AZURE_CONTAINER:-cloudatlas-backups}
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_PREFIX=cloudatlas
    networks:
      - cloudatlas-network
    depends_on:
      postgres:
        condition: service_healthy
    # Runs daily at 03:00 UTC via entrypoint override
    entrypoint: ["/bin/bash", "-c", "while true; do pg-backup; sleep 86400; done"]
    restart: unless-stopped

  # ── Flower (Celery monitoring + /metrics for Prometheus) ─────────────────────
  flower:
    build:
      context: ..
      dockerfile: infra/docker/flower.Dockerfile
    container_name: cloudatlas-flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudatlas}:${POSTGRES_PASSWORD:-cloudatlas_pass}@postgres:5432/${POSTGRES_DB:-cloudatlas_db}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    ports:
      - "0.0.0.0:5555:5555"
    networks:
      - cloudatlas-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: cloudatlas-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - cloudatlas-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Postgres Exporter ────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: cloudatlas-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-cloudatlas}:${POSTGRES_PASSWORD:-cloudatlas_pass}@postgres:5432/${POSTGRES_DB:-cloudatlas_db}?sslmode=disable"
    networks:
      - cloudatlas-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudatlas-prometheus
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - cloudatlas-network
    depends_on:
      - backend
      - redis-exporter
      - postgres-exporter
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: cloudatlas-grafana
    ports:
      - "0.0.0.0:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - cloudatlas-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  cloudatlas-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
