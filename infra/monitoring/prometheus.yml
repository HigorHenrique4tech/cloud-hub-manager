global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Backend FastAPI ───────────────────────────────────────────────────────────
  - job_name: 'cloudatlas-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          environment: 'production'

  # ── Migration Worker (Celery via flower) ──────────────────────────────────────
  - job_name: 'cloudatlas-migration-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['flower:5555']
        labels:
          service: 'migration-worker'
          environment: 'production'

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - job_name: 'cloudatlas-redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          environment: 'production'

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  - job_name: 'cloudatlas-postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          environment: 'production'

  # ── Prometheus self ──────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
